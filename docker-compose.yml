version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: agroai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: agroai123
      MYSQL_DATABASE: agroai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: agroai-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: agroai123
    ports:
      - "8082:80"
